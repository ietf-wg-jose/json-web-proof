name: "Update Editor's Copy"

on:
  push:
    paths-ignore:
    - README.md
    - CONTRIBUTING.md
    - LICENSE.md
    - .gitignore
  pull_request:
    paths-ignore:
    - README.md
    - CONTRIBUTING.md
    - LICENSE.md
    - .gitignore

jobs:
  fixtures:
    name: "Fixture Checks"
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout"
      uses: actions/checkout@v5

    - name: "Setup Node.js"
      uses: actions/setup-node@v5
      with:
        node-version: "22.13.1"
        cache: "npm"

    - name: "Install Dependencies"
      run: npm ci

    - name: "Generate Fixtures"
      run: make fixtures

    - name: "Lint Fixture Scripts"
      run: npm run lint:fixtures

    - name: "Check Fixture Artifact Manifest"
      run: npm run check:fixtures:artifacts

    - name: "Check Fixture Doc Consistency"
      run: npm run check:fixtures:docs

    - name: "Run Deterministic Tests"
      run: npm test

    - name: "Run Randomized Tests"
      run: npm run test:random

    - name: "Check Fixture Reproducibility"
      run: npm run check:repro:fixtures

  build:
    name: "Update Editor's Copy"
    runs-on: ubuntu-latest
    needs: fixtures
    permissions:
      contents: write
    steps:
    - name: "Checkout"
      uses: actions/checkout@v5

    - name: "Setup"
      id: setup
      run: date -u "+date=%FT%T" >>"$GITHUB_OUTPUT"

    - name: "Caching"
      uses: actions/cache@v4
      with:
        path: |
          .refcache
          .venv
          .gems
          node_modules
          .targets.mk
        key: i-d-${{ steps.setup.outputs.date }}
        restore-keys: i-d-

    - name: "Build Drafts"
      uses: martinthomson/i-d-template@v1
      with:
        token: ${{ github.token }}

    - name: "Update GitHub Pages"
      uses: martinthomson/i-d-template@v1
      if: ${{ github.event_name == 'push' }}
      with:
        make: gh-pages
        token: ${{ github.token }}

    - name: "Archive Built Drafts"
      uses: actions/upload-artifact@v4
      with:
        name: drafts
        path: |
          draft-*.html
          draft-*.txt
